<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Detail</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">
    <div class="w-1/2 mx-auto">
        <a href="/books" class="text-blue-400 text-base">← Geri</a>
        <div class="bg-white rounded-xl shadow m-8 p-8">
            <h1 th:text="|Title : ${book.title}|"
                class="text-2xl text-gray-800 mb-2 antialiased md:subpixel-antialiased"></h1>
            <p th:text="|Author : ${book.author}|"></p>
            <span th:if="${book.read}"
                class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-sm w-24 hover:bg-green-200">Okundu</span>
            <span th:unless="${book.read}"
                class="bg-gray-100 text-gray-500 px-2 py-1 rounded-full text-sm w-24 hover:bg-gray-200">Okunmadı</span>
        </div>
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Notlar</h2>
            <form th:attr="hx-post=@{/books/{id}/note(id=${book.id})}" hx-swap="none"
                hx-on::after-request="const msg = document.getElementById('saved-msg');msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000)">
                <textarea name="note" id="note" rows="4" th:text="${book.note}" placeholder="Not..."
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none"></textarea>
                <div class="item-center flex">
                    <button type="submit"
                        class="bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600">Kaydet</button>
                    <span id="saved-msg" class="text-green-700 hidden">✓ Kaydedildi</span>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
