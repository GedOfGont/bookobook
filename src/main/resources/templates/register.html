<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow p-8 w-96">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">📚 Kayıt Ol</h1>
        <form action="/register" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-4">
                <input type="text" name="username" id="username" placeholder="Username" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="mb-6">
                <input type="password" name="password" id="password" placeholder="Password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-medium">Sign Up</button>
        </form>
        <p class="text-center text-gray-500 text-sm mt-4">Alreay have an account? <a href="/login" class="text-blue-500 hover:text-blue-700">Sign In</a></p>
    </div>
</body>
</html>
